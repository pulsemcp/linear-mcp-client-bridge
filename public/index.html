<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Linear ↔ Claude — live activity</title>
    <style>
      :root {
        --bg: #0a0e17;
        --bg-soft: #0f1521;
        --panel: #131a28;
        --panel-2: #18202f;
        --line: #243044;
        --text: #e7edf5;
        --muted: #8b97ab;
        --dim: #5c6779;
        --accent: #7c9cff;
        --blue: #4f9dff;
        --purple: #b387ff;
        --green: #46d39a;
        --amber: #ffce5c;
        --red: #ff6b7d;
        --claude: #d97757;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        background: radial-gradient(1200px 600px at 80% -10%, #16203400, #0a0e17 60%), var(--bg);
        color: var(--text);
        font: 15px/1.55 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      code, .mono {
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12.5px;
      }

      header {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 20px;
        background: linear-gradient(180deg, var(--panel) 0%, var(--bg-soft) 100%);
        border-bottom: 1px solid var(--line);
      }
      .brand { display: flex; align-items: center; gap: 10px; font-weight: 650; letter-spacing: .2px; }
      .brand .linear { color: var(--blue); }
      .brand .arrow { color: var(--dim); }
      .brand .claude { color: var(--claude); }
      .spacer { flex: 1; }
      .pill {
        display: inline-flex; align-items: center; gap: 7px;
        padding: 5px 11px; border-radius: 999px;
        background: var(--panel-2); border: 1px solid var(--line);
        color: var(--muted); font-size: 12.5px; white-space: nowrap;
      }
      .pill b { color: var(--text); font-weight: 600; }
      .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--dim); }
      .dot.live { background: var(--green); box-shadow: 0 0 0 0 rgba(70,211,154,.6); animation: pulse 1.8s infinite; }
      .dot.connecting { background: var(--amber); }
      .dot.down { background: var(--red); }
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(70,211,154,.55); }
        70% { box-shadow: 0 0 0 7px rgba(70,211,154,0); }
        100% { box-shadow: 0 0 0 0 rgba(70,211,154,0); }
      }

      main {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 18px 20px 28px;
        scroll-behavior: smooth;
      }
      .feed { max-width: 920px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }

      .empty { color: var(--dim); text-align: center; margin-top: 18vh; font-size: 14px; }
      .empty .big { font-size: 17px; color: var(--muted); margin-bottom: 6px; }

      /* A turn divider — when a new comment starts being worked on. */
      .turn {
        margin: 16px 0 4px;
        display: flex; align-items: center; gap: 10px;
        color: var(--muted);
      }
      .turn .bar { height: 1px; background: var(--line); flex: 1; }
      .turn .label { font-size: 12px; text-transform: uppercase; letter-spacing: .12em; color: var(--dim); }

      .row {
        display: grid;
        grid-template-columns: 30px 1fr;
        gap: 12px;
        padding: 11px 14px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-left: 3px solid var(--line);
        border-radius: 12px;
        animation: rise .28s ease both;
      }
      @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
      .row .icon {
        width: 28px; height: 28px; border-radius: 8px;
        display: grid; place-items: center; font-size: 15px;
        background: var(--panel-2);
      }
      .row .meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 2px; }
      .row .who { font-weight: 600; }
      .row .time { color: var(--dim); font-size: 12px; margin-left: auto; }
      .row .body { color: var(--text); white-space: pre-wrap; word-break: break-word; }
      .row .body.mono {
        color: var(--muted); background: #0c111b; border: 1px solid var(--line);
        border-radius: 8px; padding: 7px 9px; margin-top: 4px; overflow-x: auto;
      }
      .badge {
        font-size: 11.5px; font-weight: 600; padding: 1px 8px; border-radius: 6px;
        background: var(--panel-2); color: var(--muted); border: 1px solid var(--line);
      }
      .tool-name { color: var(--purple); font-weight: 600; }

      /* Per-type accents. */
      .t-comment { border-left-color: var(--blue); }
      .t-comment .icon { color: var(--blue); background: #122036; }
      .t-comment .who { color: var(--blue); }

      .t-assistant { border-left-color: var(--claude); }
      .t-assistant .icon { color: var(--claude); background: #2a1a13; }
      .t-assistant .who { color: var(--claude); }

      .t-tool-use { border-left-color: var(--purple); }
      .t-tool-use .icon { color: var(--purple); background: #20153a; }

      .t-tool-result { border-left-color: var(--green); }
      .t-tool-result .icon { color: var(--green); background: #0f2a20; }

      .t-reply { border-left-color: var(--green); background: linear-gradient(90deg, #102a20 0%, var(--panel) 60%); }
      .t-reply .icon { color: var(--green); background: #103226; }
      .t-reply .who { color: var(--green); }
      .t-reply a { color: var(--green); }

      .t-error { border-left-color: var(--red); background: linear-gradient(90deg, #2a1217 0%, var(--panel) 60%); }
      .t-error .icon { color: var(--red); background: #34151b; }
      .t-error .who { color: var(--red); }

      .t-info { border-left-color: var(--line); }
      .t-info .icon { color: var(--muted); }
      .t-info .body { color: var(--muted); }

      .t-poll { border-left-color: var(--line); opacity: .72; padding: 7px 14px; }
      .t-poll .icon { color: var(--dim); }
      .t-poll .body { color: var(--dim); font-size: 13px; }

      footer { flex: 0 0 auto; padding: 8px 20px; border-top: 1px solid var(--line); color: var(--dim); font-size: 12px; text-align: center; background: var(--bg-soft); }
      a { color: var(--accent); }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <span class="linear">Linear</span><span class="arrow">→</span><span class="claude">Claude</span>
      </div>
      <span class="pill"><span id="status-dot" class="dot connecting"></span><span id="status-text">connecting…</span></span>
      <div class="spacer"></div>
      <span class="pill" id="issue-pill" hidden>📋 <b id="issue-label"></b></span>
      <span class="pill">events <b id="count">0</b></span>
    </header>

    <main id="scroll">
      <div class="feed" id="feed">
        <div class="empty" id="empty">
          <div class="big">Waiting for activity…</div>
          <div>Comment on a Linear ticket and watch the agent work through it here.</div>
        </div>
      </div>
    </main>

    <footer>Live activity from the Linear ↔ Claude bridge daemon · streamed over SSE</footer>

    <script>
      const feed = document.getElementById("feed");
      const scroll = document.getElementById("scroll");
      const empty = document.getElementById("empty");
      const countEl = document.getElementById("count");
      const dot = document.getElementById("status-dot");
      const statusText = document.getElementById("status-text");
      const issuePill = document.getElementById("issue-pill");
      const issueLabel = document.getElementById("issue-label");

      const ICONS = {
        info: "ℹ",
        poll: "↻",
        comment: "💬",
        "turn-start": "▶",
        assistant: "✶",
        "tool-use": "🔧",
        "tool-result": "✓",
        reply: "✅",
        skip: "⤼",
        error: "⚠",
      };
      const WHO = {
        info: "Daemon",
        poll: "Poll",
        comment: "New comment",
        assistant: "Claude",
        "tool-use": "Tool call",
        "tool-result": "Tool result",
        reply: "Reply posted",
        skip: "Skipped",
        error: "Error",
      };

      const seen = new Set();
      let count = 0;
      let lastIssue = null;

      function atBottom() {
        return scroll.scrollHeight - scroll.scrollTop - scroll.clientHeight < 80;
      }
      function stick() {
        scroll.scrollTop = scroll.scrollHeight;
      }
      function fmtTime(ts) {
        const d = new Date(ts);
        return isNaN(d) ? "" : d.toLocaleTimeString([], { hour12: false });
      }
      function el(tag, cls, text) {
        const n = document.createElement(tag);
        if (cls) n.className = cls;
        if (text != null) n.textContent = text;
        return n;
      }

      function turnDivider(ev) {
        const wrap = el("div", "turn");
        wrap.appendChild(el("div", "bar"));
        const label = ev.issue
          ? `${ev.issue}${ev.title ? " · " + ev.title : ""}`
          : "new comment";
        wrap.appendChild(el("div", "label", label));
        wrap.appendChild(el("div", "bar"));
        return wrap;
      }

      function render(ev) {
        if (seen.has(ev.id)) return;
        seen.add(ev.id);
        empty.remove?.();
        if (empty.parentNode) empty.parentNode.removeChild(empty);

        const wasBottom = atBottom();

        // Insert a divider when work moves to a different issue.
        if ((ev.type === "comment" || ev.type === "turn-start") && ev.issue && ev.issue !== lastIssue) {
          feed.appendChild(turnDivider(ev));
          lastIssue = ev.issue;
        }
        if (ev.issue) {
          issuePill.hidden = false;
          issueLabel.textContent = ev.issue;
        }

        const row = el("div", `row t-${ev.type}`);
        const icon = el("div", "icon", ICONS[ev.type] || "•");
        row.appendChild(icon);

        const main = el("div");
        const meta = el("div", "meta");
        meta.appendChild(el("span", "who", WHO[ev.type] || ev.type));
        if (ev.tool) meta.appendChild(el("span", "tool-name", ev.tool));
        if (ev.actor) meta.appendChild(el("span", "badge", ev.actor));
        if (ev.issue && ev.type === "comment") meta.appendChild(el("span", "badge", ev.issue));
        meta.appendChild(el("span", "time", fmtTime(ev.ts)));
        main.appendChild(meta);

        const monoTypes = new Set(["tool-use", "tool-result"]);
        if (ev.text) {
          const body = el("div", "body" + (monoTypes.has(ev.type) ? " mono" : ""), ev.text);
          main.appendChild(body);
        }
        if (ev.detail) {
          if (ev.type === "reply") {
            const p = el("div", "body");
            const a = el("a", null, ev.detail);
            a.href = ev.detail;
            a.target = "_blank";
            a.rel = "noreferrer";
            p.appendChild(a);
            main.appendChild(p);
          } else {
            main.appendChild(el("div", "body mono", ev.detail));
          }
        }
        row.appendChild(main);
        feed.appendChild(row);

        count++;
        countEl.textContent = count;
        if (wasBottom) stick();
      }

      function setStatus(state, text) {
        dot.className = "dot " + state;
        statusText.textContent = text;
      }

      // Optional pre-seeded events (used for static previews/screenshots).
      if (Array.isArray(window.__SEED__)) {
        window.__SEED__.forEach(render);
        stick();
      }

      function connect() {
        setStatus("connecting", "connecting…");
        const es = new EventSource("/events");
        es.addEventListener("activity", (e) => {
          setStatus("live", "live");
          try {
            render(JSON.parse(e.data));
          } catch (_) {}
        });
        es.onopen = () => setStatus("live", "live");
        es.onerror = () => setStatus("down", "reconnecting…");
      }
      // Don't try to connect for a pure static preview.
      if (!window.__SEED_ONLY__) connect();
    </script>
  </body>
</html>
