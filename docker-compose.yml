services:
  bridge:
    build: .
    # Or pull a prebuilt image instead of building:
    # image: ghcr.io/your-org/linear-mcp-client-bridge:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Defaults shown; override in .env if you like.
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-20}
      AGENT_MODEL: ${AGENT_MODEL:-claude-opus-4-8}
      AGENT_PERMISSION_MODE: ${AGENT_PERMISSION_MODE:-bypassPermissions}
      AGENT_ALLOWED_TOOLS: ${AGENT_ALLOWED_TOOLS:-}
      AGENT_DISALLOWED_TOOLS: ${AGENT_DISALLOWED_TOOLS:-}
      LINEAR_TEAM_KEYS: ${LINEAR_TEAM_KEYS:-}
    volumes:
      # Persists the session id + poll cursor across restarts.
      - bridge-state:/data
      # Shares your host `claude` login into the container so an ambient
      # `claude login` (auth Option B) works with zero setup. Harmless otherwise:
      # if you set ANTHROPIC_API_KEY (Option A) it takes precedence, and if you
      # have no ~/.claude Docker just creates an empty dir. The container runs as
      # uid 1000 (node), so this path must be readable/writable by that uid.
      - ${HOME}/.claude:/home/node/.claude

volumes:
  bridge-state:
